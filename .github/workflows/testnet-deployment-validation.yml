name: Testnet Deployment Validation

on:
  pull_request:
  push:
    branches:
      - main
      - v1.3.6-testnet-deployment-validation

jobs:
  deployment-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run deployment preflight validator
        run: >-
          python scripts/testnet/validate_testnet_deployment_preflight.py
          --min-validators 1
          --output /tmp/deployment_preflight_report.json

      - name: Run deployment preflight tests
        run: python -m pytest tests/testnet/test_testnet_deployment_preflight.py -q
