name: Wallet Crypto CI

on:
  push:
    branches:
      - main
      - 'wallet/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run wallet tests
        run: |
          pytest -q tests/wallet

      - name: Validate wallet CLI entrypoint
        run: |
          python -m influx.wallet.cli --help
          bash scripts/wallet/run.sh --help
